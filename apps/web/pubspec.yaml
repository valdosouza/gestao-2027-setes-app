# apps/web — shell multi-módulos com menus dinâmicos (decisões 10, 21, 22)
name: setes_web
description: setes-app Web — ERP multi-institution
publish_to: none
version: 0.1.0

environment:
  sdk: ^3.6.0
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  core:
    path: ../../packages/core
  setes_widgets:
    path: ../../packages/setes_widgets
  # DI e rotas (decisão 12)
  flutter_modular: ^5.0.3
  # Estado (decisão 12)
  bloc: ^8.1.4
  flutter_bloc: ^8.1.6
  equatable: ^2.0.8
  # i18n (decisão 13): traduções em JSON, troca em runtime
  easy_localization: ^3.0.7
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
